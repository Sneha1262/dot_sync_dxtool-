version: '3.8'

services:
  dev1:
    build: .
    container_name: dev_container_1
    env_file:
      - .env
    volumes:
      - ${SSH_KEY_PATH}:/root/.ssh/dx_sync_key:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; sys.exit(0 if os.path.isdir('/root/dots/.git') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

